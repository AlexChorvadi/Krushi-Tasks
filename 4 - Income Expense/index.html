<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Add Transaction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6">Add / Edit Transaction</h2>

        <form id="financeForm" class="space-y-4">

            <div>
                <label class="block mb-1 font-medium">Name</label>
                <input type="text" id="name" required
                    class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block mb-2 font-medium">Type</label>
                <div class="flex gap-6">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="status" value="Income" class="peer hidden" required>
                        <span class="px-3 py-1 rounded border peer-checked:bg-green-500 peer-checked:text-white">
                            Income
                        </span>
                    </label>

                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="status" value="Expense" class="peer hidden">
                        <span class="px-3 py-1 rounded border peer-checked:bg-red-500 peer-checked:text-white">
                            Expense
                        </span>
                    </label>
                </div>
            </div>

            <div>
                <label class="block mb-1 font-medium">Price</label>
                <input type="number" id="price" step="0.01"
                    class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500" required>
            </div>

            <div>
                <label class="block mb-1 font-medium">Date</label>
                <input type="date" id="date" required
                    class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block mb-1 font-medium">Description</label>
                <textarea id="description" rows="3" required
                    class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <div class="flex gap-2">
                <button type="submit" class="w-2/3 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                    Save
                </button>

                <button type="button" id="clearButton" onclick="document.getElementById('financeForm').reset()"
                    class="w-1/3 bg-red-600 text-white py-2 rounded-lg hover:bg-red-700 transition">
                    Clear
                </button>
            </div>

            <a href="list.html" class="block text-center mt-2 text-blue-600 underline">Back to List</a>

        </form>
    </div>

    <script>
        const form = document.getElementById("financeForm");
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get("id");

        function getData() {
            return JSON.parse(localStorage.getItem("Data")) || [];
        }

        function saveData(data) {
            localStorage.setItem("Data", JSON.stringify(data));
        }

        // If editing
        if (editId) {
            const data = getData();
            const item = data.find(t => t.id == editId);

            if (item) {
                document.getElementById("name").value = item.name;
                document.getElementById("price").value = item.price;
                document.getElementById("date").value = item.date;
                document.getElementById("description").value = item.description;
                document.querySelector(`input[name="status"][value="${item.status}"]`).checked = true;
            }
        }

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            const name = document.getElementById("name").value.trim();
            const status = document.querySelector('input[name="status"]:checked').value;
            const price = parseFloat(document.getElementById("price").value);
            const date = document.getElementById("date").value;
            const description = document.getElementById("description").value.trim();

            let data = getData();

            if (editId) {
                data = data.map(item =>
                    item.id == editId
                        ? { ...item, name, status, price, date, description }
                        : item
                );
            } else {
                data.push({
                    id: Date.now(),
                    name,
                    status,
                    price,
                    date,
                    description
                });
            }

            saveData(data);
            Swal.fire({
                position: "center-center",
                icon: "success",
                title: "Your record has been saved",
                showConfirmButton: false,
                timer: 1000
            }).then((result) => {
                window.location.href = "list.html";
            });
        });
    </script>

</body>

</html>
