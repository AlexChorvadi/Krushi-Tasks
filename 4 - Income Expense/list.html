<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Transaction List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-gray-100 min-h-screen p-6">

  <div class="max-w-6xl mx-auto">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold">Transactions</h2>
      <a href="index.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
        Add New
      </a>
    </div>

    <!-- TOTALS -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-green-100 p-4 rounded-lg shadow">
        <p class="text-sm text-gray-600">Total Income</p>
        <p id="totalIncome" class="text-xl font-bold text-green-700">0</p>
      </div>

      <div class="bg-red-100 p-4 rounded-lg shadow">
        <p class="text-sm text-gray-600">Total Expense</p>
        <p id="totalExpense" class="text-xl font-bold text-red-700">0</p>
      </div>

      <div class="bg-blue-100 p-4 rounded-lg shadow">
        <p class="text-sm text-gray-600">Net Balance</p>
        <p id="netBalance" class="text-xl font-bold text-blue-700">0</p>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="mb-4 bg-white p-4 rounded-lg shadow flex gap-6">
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="radio" name="filter" value="all" class="peer hidden" checked>
        <span class="px-3 py-1 border rounded peer-checked:bg-blue-600 peer-checked:text-white">
          All
        </span>
      </label>

      <label class="flex items-center gap-2 cursor-pointer">
        <input type="radio" name="filter" value="Income" class="peer hidden">
        <span class="px-3 py-1 border rounded peer-checked:bg-green-500 peer-checked:text-white">
          Income
        </span>
      </label>

      <label class="flex items-center gap-2 cursor-pointer">
        <input type="radio" name="filter" value="Expense" class="peer hidden">
        <span class="px-3 py-1 border rounded peer-checked:bg-red-500 peer-checked:text-white">
          Expense
        </span>
      </label>
    </div>

    <!-- TABLE -->
    <div class="bg-white shadow rounded-lg overflow-auto max-h-[60vh]">
      <table class="w-full text-left border-collapse">
        <thead class="bg-gray-200 sticky top-0">
          <tr>
            <th class="p-3 border">Sr</th>
            <th class="p-3 border">Type</th>
            <th class="p-3 border">Name</th>
            <th class="p-3 border">Price</th>
            <th class="p-3 border">Date</th>
            <th class="p-3 border">Description</th>
            <th class="p-3 border">Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const tableBody = document.getElementById("tableBody");
    const totalIncomeEl = document.getElementById("totalIncome");
    const totalExpenseEl = document.getElementById("totalExpense");
    const netBalanceEl = document.getElementById("netBalance");
    const filterRadios = document.querySelectorAll('input[name="filter"]');

    function getData() {
      return JSON.parse(localStorage.getItem("Data")) || [];
    }

    function saveData(data) {
      localStorage.setItem("Data", JSON.stringify(data));
    }

    function render() {
      const selectedFilter = document.querySelector('input[name="filter"]:checked').value;
      const allData = getData();

      let filteredData = allData;

      if (selectedFilter !== "all") {
        filteredData = allData.filter(item => item.status === selectedFilter);
      }

      if(filteredData.length === 0) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="8" class="p-4 text-center text-gray-500">
              No transactions found.
            </td>
          </tr>
        `;
        return;
      }

      // ----- CALCULATE TOTALS (based on filtered data) -----
      let totalIncome = 0;
      let totalExpense = 0;

      // ----- RENDER TABLE -----
      tableBody.innerHTML = "";

      filteredData.forEach((item, index) => {
        const sign = item.status === "Income" ? "+" : "-";
        const color = item.status === "Income" ? "text-green-600" : "text-red-600";

        if (item.status === "Income") {
          totalIncome += item.price;
        } else {
          totalExpense += item.price;
        }

        tableBody.innerHTML += `
        <tr class="hover:bg-gray-50">
          <td class="p-3 border">${index + 1}</td>
          <td class="p-3 border">${item.status}</td>
          <td class="p-3 border">${item.name}</td>
          <td class="p-3 border font-semibold ${color}">
            ${sign}₹${item.price}
          </td>
          <td class="p-3 border">${item.date}</td>
          <td class="p-3 border">${item.description}</td>
          <td class="p-3 border space-x-2">
            <a href="index.html?id=${item.id}"
              class="bg-yellow-600 text-sm text-white py-1 px-2 rounded-lg hover:bg-yellow-700 transition">Edit</a>
            <button onclick="deleteItem(${item.id})"
              class="bg-red-600 text-sm text-white py-1 px-2 rounded-lg hover:bg-red-700 transition">Delete</button>
          </td>
        </tr>
      `;
      });

      const netBalance = totalIncome - totalExpense;

      totalIncomeEl.textContent = totalIncome.toFixed(2);
      totalExpenseEl.textContent = totalExpense.toFixed(2);
      netBalanceEl.textContent = netBalance.toFixed(2);
    }

    function deleteItem(id) {
      Swal.fire({
        title: "Are you sure?",
        text: "You won't be able to revert this!",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#3085d6",
        cancelButtonColor: "#d33",
        confirmButtonText: "Yes, delete it!"
      }).then((result) => {
        if (result.isConfirmed) {
          let data = getData();
          data = data.filter(item => item.id !== id);
          saveData(data);
          render();
          Swal.fire({
            title: "Deleted!",
            text: "Your file has been deleted.",
            icon: "success"
          });
        }
      });
    }

    filterRadios.forEach(radio => {
      radio.addEventListener("change", render);
    });

    render();
  </script>

</body>

</html>
